<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  <rect x="20" y="20" width="220" height="472" rx="60" fill="#16213e"/>
  <rect x="272" y="20" width="220" height="472" rx="60" fill="#0f3460"/>
  <!-- Thai flag colors: red top, white middle, blue center -->
  <rect x="30" y="30" width="200" height="80" rx="40" fill="#A51931"/>
  <rect x="30" y="120" width="200" height="50" rx="0" fill="#F4F5F0"/>
  <rect x="30" y="170" width="200" height="80" rx="0" fill="#2D2A4A"/>
  <rect x="30" y="250" width="200" height="50" rx="0" fill="#F4F5F0"/>
  <rect x="30" y="300" width="200" height="80" rx="0" fill="#A51931"/>
  <!-- Thai text ไทย -->
  <text x="130" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">ไทย</text>
  <!-- French flag colors -->
  <rect x="282" y="30" width="67" height="452" rx="0" fill="#002395"/>
  <rect x="349" y="30" width="66" height="452" rx="0" fill="#EDEDED"/>
  <rect x="415" y="30" width="67" height="452" rx="0" fill="#ED2939"/>
  <!-- FR text -->
  <text x="402" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a1a2e" text-anchor="middle">FR</text>
  <!-- Arrow between -->
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="48" fill="#e94560" text-anchor="middle">⇄</text>
</svg>
